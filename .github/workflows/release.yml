name: Build & Release Wheel

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed for release upload

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
            wheel_tag: macosx_14_0_arm64
          # macos-x86_64 requires paid -large runner; re-enable when billing is set up
          # - os: macos-14-large
          #   target: macos-x86_64
          #   wheel_tag: macosx_13_0_x86_64
          - os: ubuntu-22.04
            target: linux-x86_64
            wheel_tag: manylinux_2_35_x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ── System deps ───────────────────────────────────────────────────

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install faust llvm
          echo "FAUST_PREFIX=$(brew --prefix faust)" >> $GITHUB_ENV
          echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config patchelf
          # Download pre-built libfaust (LLVM statically linked)
          FAUST_VERSION=$(gh release view --repo grame-cncm/faust --json tagName -q .tagName)
          gh release download --repo grame-cncm/faust -p "libfaust-ubuntu-x86_64.zip" -D /tmp
          unzip /tmp/libfaust-ubuntu-x86_64.zip -d /tmp/faust-linux
          # Download source tarball for stdlib + headers
          gh release download --repo grame-cncm/faust -p "faust-${FAUST_VERSION}.tar.gz" -D /tmp
          tar xzf "/tmp/faust-${FAUST_VERSION}.tar.gz" -C /tmp
          # Set paths
          echo "FAUST_LIB_DIR=/tmp/faust-linux/lib" >> $GITHUB_ENV
          echo "FAUST_STDLIB=/tmp/faust-${FAUST_VERSION}/libraries" >> $GITHUB_ENV
          echo "FAUST_INCLUDE=/tmp/faust-${FAUST_VERSION}/compiler" >> $GITHUB_ENV
          echo "FAUST_VERSION=${FAUST_VERSION}" >> $GITHUB_ENV
          # Install LLVM (needed for linking — libfaust.so has LLVM statically but
          # build.rs still needs LLVM libs for the linker to resolve krach-engine deps)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev
          echo "LLVM_LIB_DIR=/usr/lib/llvm-18/lib" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Build ─────────────────────────────────────────────────────────

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build krach-engine (release)
        run: cargo build --release --bin krach-engine

      # ── Vendor (macOS) ────────────────────────────────────────────────

      - name: Vendor native files (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          # macOS readlink doesn't support -f; use python for symlink resolution
          resolve() { python3 -c "import pathlib; print(pathlib.Path('$1').resolve())"; }

          BIN_DIR=krach/src/krach/_bin
          LIB_DIR=krach/src/krach/_lib
          SHARE_DIR=krach/src/krach/_share/faust

          rm -f "$BIN_DIR/.gitkeep" "$LIB_DIR/.gitkeep" "$SHARE_DIR/.gitkeep"

          cp target/release/krach-engine "$BIN_DIR/"
          chmod +x "$BIN_DIR/krach-engine"

          FAUST_REAL=$(resolve "$FAUST_PREFIX/lib/libfaust.2.dylib")
          cp "$FAUST_REAL" "$LIB_DIR/libfaust.2.dylib"
          cp "$LLVM_PREFIX/lib/libLLVM.dylib" "$LIB_DIR/libLLVM.dylib"

          UNWIND_LIB=$(otool -L target/release/krach-engine | grep libunwind | awk '{print $1}')
          if [ -n "$UNWIND_LIB" ]; then
            UNWIND_REAL=$(resolve "$UNWIND_LIB")
            cp "$UNWIND_REAL" "$LIB_DIR/libunwind.1.dylib"
          fi

          cp "$FAUST_PREFIX/share/faust/"*.lib "$SHARE_DIR/"

      - name: Fix rpaths (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          BIN_DIR=krach/src/krach/_bin
          LIB_DIR=krach/src/krach/_lib

          install_name_tool -change \
            "$FAUST_PREFIX/lib/libfaust.2.dylib" \
            "@loader_path/../_lib/libfaust.2.dylib" \
            "$BIN_DIR/krach-engine"

          UNWIND_OLD=$(otool -L "$BIN_DIR/krach-engine" | grep libunwind | awk '{print $1}')
          if [ -n "$UNWIND_OLD" ]; then
            install_name_tool -change \
              "$UNWIND_OLD" \
              "@loader_path/../_lib/libunwind.1.dylib" \
              "$BIN_DIR/krach-engine"
          fi

          install_name_tool -change \
            "$LLVM_PREFIX/lib/libLLVM.dylib" \
            "@loader_path/libLLVM.dylib" \
            "$LIB_DIR/libfaust.2.dylib"

          install_name_tool -id "@rpath/libfaust.2.dylib" "$LIB_DIR/libfaust.2.dylib"

          if [ -f "$LIB_DIR/libunwind.1.dylib" ]; then
            install_name_tool -id "@rpath/libunwind.1.dylib" "$LIB_DIR/libunwind.1.dylib"
          fi

          codesign --force --sign - "$BIN_DIR/krach-engine"
          codesign --force --sign - "$LIB_DIR/libfaust.2.dylib"
          [ -f "$LIB_DIR/libunwind.1.dylib" ] && codesign --force --sign - "$LIB_DIR/libunwind.1.dylib"

          echo "=== krach-engine deps ==="
          otool -L "$BIN_DIR/krach-engine"

      # ── Vendor (Linux) ────────────────────────────────────────────────

      - name: Vendor native files (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN_DIR=krach/src/krach/_bin
          LIB_DIR=krach/src/krach/_lib
          SHARE_DIR=krach/src/krach/_share/faust

          rm -f "$BIN_DIR/.gitkeep" "$LIB_DIR/.gitkeep" "$SHARE_DIR/.gitkeep"

          cp target/release/krach-engine "$BIN_DIR/"
          chmod +x "$BIN_DIR/krach-engine"

          # libfaust.so has LLVM statically linked — single file, no LLVM vendoring needed
          cp /tmp/faust-linux/lib/libfaust.so "$LIB_DIR/libfaust.so"

          # FAUST standard library
          cp "$FAUST_STDLIB/"*.lib "$SHARE_DIR/"

      - name: Fix rpaths (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN_DIR=krach/src/krach/_bin
          LIB_DIR=krach/src/krach/_lib

          # Set rpath so krach-engine finds libfaust.so in _lib/
          patchelf --set-rpath '$ORIGIN/../_lib' "$BIN_DIR/krach-engine"
          # Set libfaust.so soname
          patchelf --set-soname libfaust.so "$LIB_DIR/libfaust.so"

          echo "=== krach-engine deps ==="
          ldd "$BIN_DIR/krach-engine"

      # ── Build wheel ───────────────────────────────────────────────────

      - name: Install Python & uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Build wheel
        working-directory: krach
        run: |
          uv venv
          uv pip install hatchling
          uv run python -m hatchling build -t wheel
          ls -lh dist/

      - name: Rename wheel with platform tag
        working-directory: krach
        run: |
          for whl in dist/*.whl; do
            new_name=$(echo "$whl" | sed 's/py3-none-any/py3-none-${{ matrix.wheel_tag }}/')
            mv "$whl" "$new_name"
          done
          ls -lh dist/

      - name: Test wheel install
        working-directory: krach
        run: |
          uv venv /tmp/test-venv
          VIRTUAL_ENV=/tmp/test-venv uv pip install dist/*.whl
          /tmp/test-venv/bin/python -c "
          from krach._paths import resolve_engine_bin, resolve_lib_dir, resolve_faust_stdlib_dir
          engine = resolve_engine_bin()
          print(f'engine: {engine}')
          assert engine.is_file(), f'engine not found: {engine}'

          lib_dir = resolve_lib_dir()
          print(f'lib_dir: {lib_dir}')
          assert lib_dir is not None and lib_dir.is_dir(), f'lib_dir not found: {lib_dir}'

          stdlib = resolve_faust_stdlib_dir()
          print(f'faust_stdlib: {stdlib}')
          assert stdlib is not None and stdlib.is_dir(), f'stdlib not found: {stdlib}'

          print('All vendored paths resolved successfully')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: krach/dist/*.whl

  # ── Clean-install test ───────────────────────────────────────────────

  clean-install:
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-14
            artifact: wheel-macos-arm64
          - os: ubuntu-22.04
            artifact: wheel-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install wheel in fresh venv
        run: |
          uv venv /tmp/clean-venv
          VIRTUAL_ENV=/tmp/clean-venv uv pip install dist/*.whl

      - name: Verify krach --help
        run: /tmp/clean-venv/bin/krach --help

      - name: Verify krach --version
        run: |
          VERSION=$(/tmp/clean-venv/bin/krach --version)
          echo "$VERSION"
          echo "$VERSION" | grep -q "krach 0\."

      - name: Verify vendored paths resolve
        run: |
          /tmp/clean-venv/bin/python -c "
          from krach._paths import resolve_engine_bin, resolve_lib_dir, resolve_faust_stdlib_dir
          import os, stat

          engine = resolve_engine_bin()
          assert engine.is_file(), f'engine not found: {engine}'
          assert os.access(engine, os.X_OK), f'engine not executable: {engine}'

          lib_dir = resolve_lib_dir()
          assert lib_dir is not None and lib_dir.is_dir(), f'lib_dir not found: {lib_dir}'

          stdlib = resolve_faust_stdlib_dir()
          assert stdlib is not None and stdlib.is_dir(), f'stdlib not found: {stdlib}'

          print('Clean-install verification passed')
          "

  # ── Publish to PyPI ──────────────────────────────────────────────────

  publish:
    needs: [build, clean-install]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -lh dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # ── GitHub Release ───────────────────────────────────────────────────

  release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/*.whl \
            --title "$TAG" \
            --generate-notes
