name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # Exclude audio-faust and krach-engine (require libfaust + LLVM, not available in CI)
      - run: cargo check -p audio-engine -p pattern-engine
      - run: cargo test -p audio-engine -p pattern-engine

  python-krach:
    name: Python krach (pyright + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krach
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run pyright
      - run: uv run pytest -x -q

  python-faust-dsl:
    name: Python faust-dsl (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faust-dsl
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run pytest -x -q
