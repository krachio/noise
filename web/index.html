<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>krach — try it</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg: #1a1a2e; --bg-cell: #16213e; --bg-output: #0f0f23;
    --border: #333; --text: #e0e0e0; --text-dim: #888;
    --accent: #6a9955; --accent-dim: #2d5a2d;
    --error: #f44747; --result: #569cd6; --info: #dcdcaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; }

  header {
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
  header .status { font-size: 12px; color: var(--text-dim); }
  header .status.ready { color: var(--accent); }
  header .status.error { color: var(--error); }
  .run-all-btn {
    margin-left: auto; background: var(--accent-dim); color: var(--text);
    border: 1px solid var(--accent); padding: 6px 16px; border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 12px;
  }
  .run-all-btn:hover { background: var(--accent); color: #000; }
  .run-all-btn:disabled { opacity: 0.4; cursor: default; }

  #cells { padding: 16px; max-width: 960px; margin: 0 auto; }

  .cell {
    margin-bottom: 12px; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; background: var(--bg-cell);
  }
  .cell.running { border-color: var(--accent); }
  .cell-bar {
    display: flex; align-items: center; padding: 4px 8px;
    background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border);
  }
  .cell-num { color: var(--text-dim); font-size: 11px; min-width: 60px; }
  .cell-bar .spacer { flex: 1; }
  .cell-bar button {
    background: var(--accent-dim); color: var(--text); border: none;
    padding: 3px 10px; border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 11px; margin-left: 4px;
  }
  .cell-bar button:hover { background: var(--accent); color: #000; }

  .cm-editor { font-size: 14px !important; }
  .cm-editor .cm-content { padding: 8px 0; }
  .cm-editor .cm-gutters { background: transparent; border: none; }

  .output {
    padding: 8px 12px; font-size: 13px; white-space: pre-wrap;
    background: var(--bg-output); max-height: 200px; overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .output:empty { display: none; }
  .output .err { color: var(--error); }
  .output .res { color: var(--result); }

  #add-cell {
    display: block; margin: 8px auto 32px; background: transparent;
    color: var(--text-dim); border: 1px dashed var(--border);
    padding: 6px 20px; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 12px;
  }
  #add-cell:hover { border-color: var(--accent); color: var(--text); }

  .progress { height: 3px; background: var(--border); margin-top: -1px; }
  .progress-bar { height: 100%; background: var(--accent); width: 0; transition: width 0.3s; }
</style>
</head>
<body>
<header>
  <h1>krach</h1>
  <span id="status" class="status">loading...</span>
  <button class="run-all-btn" id="run-all" disabled onclick="runAll()">▶ Run All</button>
</header>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
<div id="cells"></div>
<button id="add-cell" onclick="addCell('')">+ add cell</button>

<!-- CodeMirror 5 (single script, no ESM version conflicts) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
<script>window._cmReady = true;</script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>

<script>
// ── State ──
let pyodide = null;
let cellCount = 0;
const cells = [];
const status = document.getElementById('status');
const progress = document.getElementById('progress');

// ── Wait for CodeMirror ESM to load ──
function waitForCM() {
  return new Promise(resolve => {
    if (window._cmReady) return resolve();
    window._onCmReady = resolve;
  });
}

// ── Cell management ──
function addCell(code = '', autoFocus = true) {
  cellCount++;
  const n = cellCount;
  const container = document.getElementById('cells');
  const div = document.createElement('div');
  div.className = 'cell';
  div.id = `cell-${n}`;
  div.innerHTML = `
    <div class="cell-bar">
      <span class="cell-num">In [${n}]</span>
      <span class="spacer"></span>
      <button onclick="runCellN(${n})">▶ Run</button>
    </div>
    <div id="editor-${n}"></div>
    <div id="output-${n}" class="output"></div>
  `;
  container.appendChild(div);

  const editor = CodeMirror(document.getElementById(`editor-${n}`), {
    value: code,
    mode: 'python',
    theme: 'material-darker',
    lineNumbers: false,
    matchBrackets: true,
    autoCloseBrackets: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    viewportMargin: Infinity,
    extraKeys: {
      'Shift-Enter': function(cm) {
        runCellN(n);
        const idx = cells.findIndex(c => c.n === n);
        if (idx === cells.length - 1) {
          addCell('', true);
        } else {
          cells[idx + 1].editor.focus();
        }
      },
      'Ctrl-Enter': function() { runCellN(n); },
      'Cmd-Enter': function() { runCellN(n); },
    }
  });

  const cell = { n, editor, div };
  cells.push(cell);
  if (autoFocus) setTimeout(() => editor.focus(), 50);
  return cell;
}

function addCellAfter(afterN) {
  const idx = cells.findIndex(c => c.n === afterN);
  const newCell = addCell('', true);
  // Move the new cell DOM after the reference cell
  if (idx >= 0 && idx < cells.length - 1) {
    const refDiv = cells[idx].div;
    refDiv.after(newCell.div);
  }
}

window.addCell = addCell;

// ── Execution ──
async function runCellN(n) {
  if (!pyodide) return;
  const cell = cells.find(c => c.n === n);
  if (!cell) return;
  const code = cell.editor.getValue().trim();
  if (!code) return;

  const out = document.getElementById(`output-${n}`);
  cell.div.classList.add('running');
  out.innerHTML = '';

  try {
    pyodide.runPython(`
import sys, io
_cell_out = io.StringIO()
sys.stdout = _cell_out
sys.stderr = _cell_out
`);
    let result = await pyodide.runPythonAsync(code);
    let stdout = pyodide.runPython('_cell_out.getvalue()');
    pyodide.runPython('sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__');

    if (stdout) out.textContent = stdout;
    if (result !== undefined && result !== null && String(result) !== 'None') {
      const span = document.createElement('span');
      span.className = 'res';
      span.textContent = String(result) + '\n';
      out.appendChild(span);
    }
  } catch(e) {
    const span = document.createElement('span');
    span.className = 'err';
    span.textContent = e.message + '\n';
    out.appendChild(span);
  }
  cell.div.classList.remove('running');
}

window.runCellN = runCellN;

async function runAll() {
  for (const cell of cells) {
    await runCellN(cell.n);
  }
}
window.runAll = runAll;

// ── Init ──
async function init() {
  try {
    progress.style.width = '20%';
    status.textContent = 'loading Python...';

    // Load Pyodide on main thread
    pyodide = await loadPyodide();
    progress.style.width = '50%';
    status.textContent = 'installing krach...';

    // Install wheels
    await pyodide.loadPackage('micropip');
    const micropip = pyodide.pyimport('micropip');
    const base = window.location.href.replace(/[^/]*$/, '');
    await micropip.install(base + 'pypi/faust_dsl-0.1.0-py3-none-any.whl');
    await micropip.install(base + 'pypi/krach-0.1.0-py3-none-any.whl');
    progress.style.width = '80%';
    status.textContent = 'setting up krach...';

    // Setup kr and krs
    await pyodide.runPythonAsync(`
from krach._web_audio import connect_web
import krach.dsp as krs
kr = connect_web(bpm=120, master=0.7)
`);

    progress.style.width = '100%';
    status.textContent = 'ready — Shift+Enter to run';
    status.className = 'status ready';
    document.getElementById('run-all').disabled = false;

    // Pre-populate cells
    addCell(`# krach is ready! kr and krs are in scope.
print("Python:", __import__('sys').version.split()[0])
print("kr:", type(kr).__name__)`, false);

    addCell(`# Create a voice and play a 4-on-the-floor kick
kick = kr.node("kick", "oscillator", gain=0.5)
kick @ kr.hit() * 4
print("kick playing!")`, false);

    addCell(`# Add a bass line
bass = kr.node("bass", "oscillator", gain=0.3)
bass @ kr.seq("A2", "D3", None, "E2").over(2)
print("bass playing!")`, false);

    addCell(`# Add swing
kick @ (kr.hit() * 8).swing(0.67)
print("swung!")`, false);

    addCell(`# Stop everything
kr.stop()
print("silence.")`, false);

    setTimeout(() => { progress.style.width = '0%'; }, 1000);

  } catch(e) {
    status.textContent = 'error: ' + e.message;
    status.className = 'status error';
    // Still allow cells for debugging
    addCell(`# Error loading krach: ${e.message}\n# Try: print("hello")`, false);
  }
}

init();
</script>
</body>
</html>
