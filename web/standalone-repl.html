<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>krach REPL</title>
<style>
  body { margin: 0; background: #1e1e1e; color: #d4d4d4; font-family: 'JetBrains Mono', monospace; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
  #output { padding: 16px; white-space: pre-wrap; font-size: 14px; overflow-y: auto; height: calc(100vh - 60px); }
  #input-line { display: flex; padding: 8px 16px; background: #2d2d2d; }
  #prompt { color: #6a9955; margin-right: 8px; line-height: 28px; }
  #input { flex: 1; background: transparent; border: none; color: #d4d4d4; font-family: inherit; font-size: 14px; outline: none; }
  .error { color: #f44747; }
  .info { color: #569cd6; }
</style>
</head>
<body>
<div id="output"><span class="info">Loading Pyodide + krach...</span>
</div>
<div id="input-line">
  <span id="prompt">In [1]:</span>
  <input id="input" autofocus placeholder="Type Python here...">
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const prompt = document.getElementById('prompt');
let pyodide = null;
let cellNum = 1;

function print(text, cls = '') {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
}

async function init() {
  try {
    print('Loading Python runtime (Pyodide)...', 'info');
    pyodide = await loadPyodide();
    print('Installing krach...', 'info');
    await pyodide.loadPackage('micropip');
    const micropip = pyodide.pyimport('micropip');

    // Install from local wheels if available, otherwise skip
    try {
      const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
      await micropip.install(base + 'pypi/faust_dsl-0.1.0-py3-none-any.whl');
      await micropip.install(base + 'pypi/krach-0.1.0-py3-none-any.whl');
      print('krach installed!', 'info');

      // Auto-setup kr and krs
      await pyodide.runPythonAsync(`
from krach._web_audio import connect_web
kr = connect_web(bpm=120, master=0.7)
import krach.dsp as krs
`);
      print('kr  = audio graph (nodes, patterns, routing)', 'info');
      print('krs = DSP primitives (oscillators, filters, envelopes)', 'info');
    } catch(e) {
      print('Error installing krach: ' + e.message, 'error');
      print('Using vanilla Python instead.', 'info');
    }

    print('');
    print('krach REPL ready. Type Python code below.', 'info');
    print('Try: print("hello from Pyodide!")');
    print('');
    input.disabled = false;
    input.focus();
  } catch(e) {
    print('Error loading: ' + e.message, 'error');
  }
}

input.disabled = true;

input.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter' || !pyodide) return;
  const code = input.value.trim();
  if (!code) return;

  print(`In [${cellNum}]: ${code}`);
  input.value = '';

  try {
    // Redirect stdout
    pyodide.runPython(`
import sys, io
_stdout = io.StringIO()
sys.stdout = _stdout
`);

    let result = await pyodide.runPythonAsync(code);

    // Get captured stdout
    let stdout = pyodide.runPython('_stdout.getvalue()');
    pyodide.runPython('sys.stdout = sys.__stdout__');

    if (stdout) print(stdout.trimEnd());
    if (result !== undefined && result !== null) {
      print(`Out[${cellNum}]: ${result}`);
    }
  } catch(err) {
    print(err.message, 'error');
  }

  cellNum++;
  prompt.textContent = `In [${cellNum}]:`;
});

init();
</script>
</body>
</html>
